<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <!-- layout: hybrid -->
  <defs>
    <linearGradient id="transitionGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f1f5f9"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
    <linearGradient id="detailBgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.35"/>
    </filter>
  </defs>

  <!-- === BACKGROUND === -->
  <rect width="1200" height="630" fill="#ffffff"/>
  <rect y="390" width="1200" height="240" fill="url(#detailBgGrad)"/>
  <rect y="370" width="1200" height="30" fill="url(#transitionGrad)"/>

  <!-- === HEAD ZONE === -->
  <text x="600" y="68" text-anchor="middle"
        font-family="-apple-system, BlinkMacSystemFont, Segoe UI, Noto Sans TC, sans-serif"
        font-size="34" font-weight="700" fill="#1e293b">
    /yt2pdf
  </text>
  <text x="600" y="105" text-anchor="middle"
        font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif"
        font-size="18" font-weight="600" fill="#475569">
    YouTube → Bilingual PDF Summary
  </text>
  <line x1="350" y1="125" x2="850" y2="125" stroke="#e2e8f0" stroke-width="1.5"/>

  <!-- 3 phase cards -->
  <!-- Phase 1: YouTube -->
  <g transform="translate(200, 245)">
    <rect x="-140" y="-80" width="280" height="190" rx="16" fill="#fecaca" stroke="#dc2626" stroke-width="3"/>
    <text x="0" y="-30" text-anchor="middle" font-family="sans-serif" font-size="42" font-weight="700" fill="#dc2626">▶</text>
    <text x="0" y="10" text-anchor="middle" font-family="sans-serif" font-size="26" font-weight="700" fill="#991b1b">YouTube</text>
    <text x="0" y="38" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="600" fill="#b91c1c">Transcript + Metadata</text>
    <text x="0" y="60" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="600" fill="#b91c1c">Whisper ASR Fallback</text>
    <rect x="-40" y="72" width="80" height="22" rx="11" fill="#dc2626"/>
    <text x="0" y="88" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="700" fill="#fff">Input</text>
  </g>

  <!-- Arrow 1→2 -->
  <text x="400" y="250" text-anchor="middle" font-family="sans-serif" font-size="28" font-weight="700" fill="#cbd5e1">→</text>

  <!-- Phase 2: AI Summary -->
  <g transform="translate(600, 245)">
    <rect x="-140" y="-80" width="280" height="190" rx="16" fill="#bfdbfe" stroke="#2563eb" stroke-width="3"/>
    <text x="0" y="-25" text-anchor="middle" font-family="sans-serif" font-size="38" font-weight="700" fill="#2563eb">AI</text>
    <text x="0" y="10" text-anchor="middle" font-family="sans-serif" font-size="26" font-weight="700" fill="#1e3a5f">Summary</text>
    <text x="0" y="38" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="600" fill="#1d4ed8">EN + 繁體中文</text>
    <text x="0" y="60" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="600" fill="#1d4ed8">Structured Outline</text>
    <rect x="-44" y="72" width="88" height="22" rx="11" fill="#2563eb"/>
    <text x="0" y="88" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="700" fill="#fff">Process</text>
  </g>

  <!-- Arrow 2→3 -->
  <text x="800" y="250" text-anchor="middle" font-family="sans-serif" font-size="28" font-weight="700" fill="#cbd5e1">→</text>

  <!-- Phase 3: PDF -->
  <g transform="translate(1000, 245)">
    <rect x="-140" y="-80" width="280" height="190" rx="16" fill="#bbf7d0" stroke="#16a34a" stroke-width="3"/>
    <text x="0" y="-20" text-anchor="middle" font-family="sans-serif" font-size="38" font-weight="700" fill="#16a34a">PDF</text>
    <text x="0" y="10" text-anchor="middle" font-family="sans-serif" font-size="26" font-weight="700" fill="#166534">Download</text>
    <text x="0" y="38" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="600" fill="#15803d">Headless Chrome</text>
    <text x="0" y="60" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="600" fill="#15803d">B2 Presigned URL</text>
    <rect x="-40" y="72" width="80" height="22" rx="11" fill="#16a34a"/>
    <text x="0" y="88" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="700" fill="#fff">Output</text>
  </g>

  <!-- === DETAIL ZONE: Tech stack (centered, 6 boxes with purpose) === -->
  <text x="600" y="420" text-anchor="middle"
        font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif"
        font-size="16" font-weight="700" fill="#cbd5e1">6-Stage Pipeline</text>

  <!-- Grid: 5 boxes × 155px + 4 gaps × 40px = 935px. margin = (1200-935)/2 = 132 -->
  <rect x="132" y="438" width="155" height="52" rx="8" fill="#0f172a" stroke="#ef4444" stroke-width="1.5"/>
  <text x="209" y="458" text-anchor="middle" font-family="sans-serif" font-size="16" font-weight="700" fill="#ef4444">yt-dlp</text>
  <text x="209" y="478" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="600" fill="#94a3b8">Extract transcript</text>

  <text x="307" y="468" text-anchor="middle" font-family="sans-serif" font-size="18" font-weight="700" fill="#475569">→</text>

  <rect x="327" y="438" width="155" height="52" rx="8" fill="#0f172a" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="404" y="458" text-anchor="middle" font-family="sans-serif" font-size="16" font-weight="700" fill="#f59e0b">Whisper</text>
  <text x="404" y="478" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="600" fill="#94a3b8">Speech-to-text</text>

  <text x="502" y="468" text-anchor="middle" font-family="sans-serif" font-size="18" font-weight="700" fill="#475569">→</text>

  <rect x="522" y="438" width="155" height="52" rx="8" fill="#0f172a" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="599" y="458" text-anchor="middle" font-family="sans-serif" font-size="16" font-weight="700" fill="#3b82f6">LLM Summary</text>
  <text x="599" y="478" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="600" fill="#94a3b8">EN + 繁中 outline</text>

  <text x="697" y="468" text-anchor="middle" font-family="sans-serif" font-size="18" font-weight="700" fill="#475569">→</text>

  <rect x="717" y="438" width="155" height="52" rx="8" fill="#0f172a" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="794" y="458" text-anchor="middle" font-family="sans-serif" font-size="16" font-weight="700" fill="#a78bfa">Chrome PDF</text>
  <text x="794" y="478" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="600" fill="#94a3b8">Headless render</text>

  <text x="892" y="468" text-anchor="middle" font-family="sans-serif" font-size="18" font-weight="700" fill="#475569">→</text>

  <rect x="912" y="438" width="155" height="52" rx="8" fill="#0f172a" stroke="#22c55e" stroke-width="1.5"/>
  <text x="989" y="458" text-anchor="middle" font-family="sans-serif" font-size="16" font-weight="700" fill="#4ade80">Backblaze B2</text>
  <text x="989" y="478" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="600" fill="#94a3b8">Presigned URL</text>

  <!-- Tagline -->
  <text x="600" y="545" text-anchor="middle"
        font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif"
        font-size="15" font-weight="600" fill="#64748b">
    Fully automated · Paste a YouTube URL → Get a bilingual PDF in seconds
  </text>

  <!-- Bottom attribution -->
  <g opacity="0.45">
    <text x="600" y="618" text-anchor="middle" fill="#64748b" font-family="Segoe UI, Arial, sans-serif" font-size="11" font-weight="600" letter-spacing="0.5px">osisdie.github.io · yt2pdf Pipeline</text>
  </g>
</svg>
