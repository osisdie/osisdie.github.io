  <!-- Anchor: 3-box flow (centered on x=600, y=500) -->
  <g>
    <rect x="320" y="465" width="160" height="72" rx="14" fill="none" stroke="#CB4B16" stroke-width="3"/>
    <text x="400" y="508" text-anchor="middle" font-family='"JetBrains Mono", "Consolas", "Menlo", monospace' font-size="15" font-weight="700" fill="#CB4B16" letter-spacing="1px">INTENT</text>
    <text x="500" y="510" text-anchor="middle" font-family='-apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans TC", sans-serif' font-size="28" font-weight="700" fill="#93A1A1">&#8594;</text>
    <rect x="520" y="465" width="160" height="72" rx="14" fill="none" stroke="#CB4B16" stroke-width="3"/>
    <text x="600" y="508" text-anchor="middle" font-family='"JetBrains Mono", "Consolas", "Menlo", monospace' font-size="15" font-weight="700" fill="#CB4B16" letter-spacing="1px">TEMPORAL</text>
    <text x="700" y="510" text-anchor="middle" font-family='-apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans TC", sans-serif' font-size="28" font-weight="700" fill="#93A1A1">&#8594;</text>
    <rect x="720" y="465" width="160" height="72" rx="14" fill="none" stroke="#CB4B16" stroke-width="3"/>
    <text x="800" y="508" text-anchor="middle" font-family='"JetBrains Mono", "Consolas", "Menlo", monospace' font-size="15" font-weight="700" fill="#CB4B16" letter-spacing="1px">CONFIDENCE</text>
