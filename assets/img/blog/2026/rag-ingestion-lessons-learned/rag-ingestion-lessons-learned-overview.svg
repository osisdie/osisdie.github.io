<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <!-- layout: cream -->
  <rect width="1200" height="630" fill="#FDF6E3"/>

  <!-- Category (top-left) + accent rule -->
