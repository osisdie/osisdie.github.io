  <!-- Headline (2 lines, left-aligned) -->
  <text x="100" y="255" font-family='-apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans TC", sans-serif' font-size="66" font-weight="800" fill="#073642" letter-spacing="-1px">Production-Ready RAG</text>
  <text x="100" y="334" font-family='-apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans TC", sans-serif' font-size="66" font-weight="800" fill="#073642" letter-spacing="-1px">Is Three Layers Deep</text>

