<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <!-- layout: cream -->
  <rect width="1200" height="630" fill="#FDF6E3"/>

  <!-- Category (top-left) + accent rule -->
  <text x="100" y="92" font-family='"JetBrains Mono", "Consolas", "Menlo", monospace' font-size="18" font-weight="700" fill="#CB4B16" letter-spacing="2px">RAG · LLM DESIGN</text>
  <line x1="100" y1="108" x2="220" y2="108" stroke="#CB4B16" stroke-width="3"/>

  <!-- Blog wordmark (top-right) -->
  <text x="1100" y="92" text-anchor="end" font-family='"JetBrains Mono", "Consolas", "Menlo", monospace' font-size="14" font-weight="500" fill="#93A1A1" letter-spacing="0.5px">Kevin&#8217;s Tech Blog</text>

  <!-- Headline (2 lines) -->
  <text x="100" y="225" font-family='-apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans TC", sans-serif' font-size="68" font-weight="800" fill="#073642" letter-spacing="-1px">一次 LLM call</text>
  <text x="100" y="305" font-family='-apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans TC", sans-serif' font-size="68" font-weight="800" fill="#073642" letter-spacing="-1px">做兩件事</text>

  <!-- Sub-hook -->
  <text x="100" y="365" font-family='-apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans TC", sans-serif' font-size="24" font-weight="500" fill="#586E75">Temporal date-range 解析合併進 intent classifier 的多任務輸出</text>

  <!-- Punchline (schema reveal) -->
  <g transform="translate(100, 460)">
    <rect x="0" y="-40" width="700" height="78" rx="12" fill="#073642"/>
    <text x="24" y="-7" font-family='"JetBrains Mono", "Consolas", "Menlo", monospace' font-size="14" font-weight="600" fill="#93A1A1" letter-spacing="1px">SCHEMA</text>
    <text x="24" y="22" font-family='"JetBrains Mono", "Consolas", "Menlo", monospace' font-size="22" font-weight="700" fill="#FDF6E3">{intent, temporal, date_range, vagueness}</text>
  </g>

  <!-- Side label -->
  <text x="830" y="436" font-family='-apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif' font-size="20" font-weight="700" fill="#073642">1× LLM call</text>
  <text x="830" y="464" font-family='-apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif' font-size="20" font-weight="700" fill="#073642">2 jobs done</text>
  <text x="830" y="494" font-family='-apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans TC", sans-serif' font-size="16" font-weight="500" fill="#586E75">zero round-trip cost</text>

  <!-- Meta (bottom-left) -->
  <text x="100" y="585" font-family='"JetBrains Mono", "Consolas", "Menlo", monospace' font-size="16" font-weight="500" fill="#93A1A1" letter-spacing="0.5px">@osisdie &#183; 2026.04.29</text>

  <!-- Bottom attribution -->
  <g opacity="0.45">
    <text x="600" y="618" text-anchor="middle" fill="#64748b" font-family="Segoe UI, Arial, sans-serif" font-size="11" font-weight="600" letter-spacing="0.5px">osisdie.github.io · multi-task intent LLM</text>
  </g>
</svg>
