<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <!-- layout: hybrid -->
  <defs>
    <linearGradient id="transitionGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f1f5f9"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
    <linearGradient id="detailBgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
  </defs>

  <!-- === BACKGROUND === -->
  <rect width="1200" height="630" fill="#ffffff"/>
  <rect y="390" width="1200" height="240" fill="url(#detailBgGrad)"/>
  <rect y="370" width="1200" height="30" fill="url(#transitionGrad)"/>

  <!-- === HEAD ZONE === -->
  <text x="600" y="68" text-anchor="middle"
        font-family="-apple-system, BlinkMacSystemFont, Segoe UI, Noto Sans TC, sans-serif"
        font-size="32" font-weight="700" fill="#1e293b">
    RAG Pipeline Eval-Driven Tuning
  </text>
  <text x="600" y="105" text-anchor="middle"
        font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif"
        font-size="18" font-weight="600" fill="#475569">
    Threshold Sweep · Progressive Fallback · Date Hint Days
  </text>
  <line x1="260" y1="128" x2="940" y2="128" stroke="#e2e8f0" stroke-width="1.5"/>

  <!-- 3 takeaway cards -->
  <!-- Date Hint Days (Layer 1 — Intent) -->
  <g transform="translate(200, 240)">
    <rect x="-140" y="-65" width="280" height="170" rx="16" fill="#bfdbfe" stroke="#2563eb" stroke-width="3"/>
    <text x="0" y="-25" text-anchor="middle"
          font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif"
          font-size="24" font-weight="700" fill="#1e3a5f">Date Hint</text>
    <text x="0" y="2" text-anchor="middle"
          font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif"
          font-size="24" font-weight="700" fill="#1e3a5f">Days</text>
    <text x="0" y="34" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="600" fill="#1d4ed8">Optional[int] 1–365</text>
    <text x="0" y="56" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="600" fill="#1d4ed8">Classifier 推測 window</text>
    <rect x="-50" y="74" width="100" height="22" rx="11" fill="#2563eb"/>
    <text x="0" y="90" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="700" fill="#fff">Layer 1</text>
  </g>

  <!-- Progressive Fallback (Layer 2 — Temporal) -->
  <g transform="translate(600, 240)">
    <rect x="-140" y="-65" width="280" height="170" rx="16" fill="#bbf7d0" stroke="#16a34a" stroke-width="3"/>
    <text x="0" y="-25" text-anchor="middle"
          font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif"
          font-size="24" font-weight="700" fill="#166534">Progressive</text>
    <text x="0" y="2" text-anchor="middle"
          font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif"
          font-size="24" font-weight="700" fill="#166534">Fallback</text>
    <text x="0" y="34" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="600" fill="#15803d">primary → 30d → 90d</text>
    <text x="0" y="56" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="600" fill="#15803d">→ no_filter · logged</text>
    <rect x="-50" y="74" width="100" height="22" rx="11" fill="#16a34a"/>
    <text x="0" y="90" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="700" fill="#fff">Layer 2</text>
  </g>

  <!-- Threshold Sweep (Layer 3 — Confidence) -->
  <g transform="translate(1000, 240)">
    <rect x="-140" y="-65" width="280" height="170" rx="16" fill="#fde68a" stroke="#d97706" stroke-width="3"/>
    <text x="0" y="-25" text-anchor="middle"
          font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif"
          font-size="24" font-weight="700" fill="#92400e">Threshold</text>
    <text x="0" y="2" text-anchor="middle"
          font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif"
          font-size="24" font-weight="700" fill="#92400e">Sweep</text>
    <text x="0" y="34" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="600" fill="#b45309">21 values · 48 queries</text>
    <text x="0" y="56" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="600" fill="#b45309">F1 plateau 0.62–0.64</text>
    <rect x="-50" y="74" width="100" height="22" rx="11" fill="#d97706"/>
    <text x="0" y="90" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="700" fill="#fff">Layer 3</text>
  </g>

  <!-- === DETAIL ZONE: Eval → Tune → Redeploy loop === -->
  <text x="600" y="420" text-anchor="middle"
        font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif"
        font-size="16" font-weight="700" fill="#cbd5e1">Eval → Tune → Redeploy Loop</text>

  <!-- 5-stage flow: Golden Set → Sweep → PR + OOS FP → Deploy → Observe -->
  <g font-family="sans-serif" font-size="13" font-weight="700">
    <!-- Stage 1: Golden Set -->
    <rect x="106" y="445" width="180" height="56" rx="8" fill="#0f172a" stroke="#60a5fa" stroke-width="1.5"/>
    <text x="196" y="468" text-anchor="middle" font-size="15" fill="#60a5fa">Golden Set</text>
    <text x="196" y="488" text-anchor="middle" font-size="12" font-weight="600" fill="#94a3b8">42 in-scope + 6 OOS</text>

    <text x="296" y="478" text-anchor="middle" font-size="20" font-weight="700" fill="#cbd5e1">&#8594;</text>

    <!-- Stage 2: Sweep -->
    <rect x="308" y="445" width="180" height="56" rx="8" fill="#0f172a" stroke="#22d3ee" stroke-width="1.5"/>
    <text x="398" y="468" text-anchor="middle" font-size="15" fill="#22d3ee">Threshold Sweep</text>
    <text x="398" y="488" text-anchor="middle" font-size="12" font-weight="600" fill="#94a3b8">21 values · bypass_cache</text>

    <text x="498" y="478" text-anchor="middle" font-size="20" font-weight="700" fill="#cbd5e1">&#8594;</text>

    <!-- Stage 3: PR + OOS FP -->
    <rect x="510" y="445" width="180" height="56" rx="8" fill="#0f172a" stroke="#4ade80" stroke-width="1.5"/>
    <text x="600" y="468" text-anchor="middle" font-size="15" fill="#4ade80">PR + OOS FP</text>
    <text x="600" y="488" text-anchor="middle" font-size="12" font-weight="600" fill="#94a3b8">warning ratio 0.10</text>

    <text x="700" y="478" text-anchor="middle" font-size="20" font-weight="700" fill="#cbd5e1">&#8594;</text>

    <!-- Stage 4: Deploy -->
    <rect x="712" y="445" width="180" height="56" rx="8" fill="#0f172a" stroke="#a78bfa" stroke-width="1.5"/>
    <text x="802" y="468" text-anchor="middle" font-size="15" fill="#a78bfa">Deploy</text>
    <text x="802" y="488" text-anchor="middle" font-size="12" font-weight="600" fill="#94a3b8">threshold committed</text>

    <text x="902" y="478" text-anchor="middle" font-size="20" font-weight="700" fill="#cbd5e1">&#8594;</text>

    <!-- Stage 5: Observe -->
    <rect x="914" y="445" width="180" height="56" rx="8" fill="#0f172a" stroke="#fbbf24" stroke-width="1.5"/>
    <text x="1004" y="468" text-anchor="middle" font-size="15" fill="#fcd34d">Observe</text>
    <text x="1004" y="488" text-anchor="middle" font-size="12" font-weight="600" fill="#94a3b8">fallback_level logs</text>
  </g>

  <!-- Tagline -->
  <text x="600" y="545" text-anchor="middle"
        font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif"
        font-size="15" font-weight="600" fill="#94a3b8">
    Qdrant · BGE-M3 · Eval-Driven · Observable
  </text>

  <!-- Bottom attribution -->
  <g opacity="0.45">
    <text x="600" y="618" text-anchor="middle" fill="#64748b" font-family="Segoe UI, Arial, sans-serif" font-size="11" font-weight="600" letter-spacing="0.5px">osisdie.github.io · RAG Pipeline Eval-Driven Tuning</text>
  </g>
</svg>
