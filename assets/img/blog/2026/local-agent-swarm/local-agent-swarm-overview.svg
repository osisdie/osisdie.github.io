<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 520" font-family="-apple-system, system-ui, Arial, sans-serif">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#1e293b;stop-opacity:1"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="680" height="520" fill="url(#bgGrad)" rx="12"/>

  <!-- Title -->
  <text x="340" y="38" text-anchor="middle" fill="#f1f5f9" font-size="20" font-weight="700" letter-spacing="0.5px">Local Agent Swarm Frameworks</text>
  <text x="340" y="60" text-anchor="middle" fill="#94a3b8" font-size="13" font-weight="500">Multi-Agent Orchestration Patterns</text>

  <!-- Orchestrator (center) -->
  <circle cx="340" cy="170" r="42" fill="#1e3a5f" stroke="#38bdf8" stroke-width="2"/>
  <text x="340" y="165" text-anchor="middle" fill="#38bdf8" font-size="14" font-weight="600">Orchestrator</text>
  <text x="340" y="182" text-anchor="middle" fill="#7dd3fc" font-size="13">/Router</text>

  <!-- Agent A (left) -->
  <rect x="60" y="130" width="130" height="70" rx="10" fill="#1e293b" stroke="#4ade80" stroke-width="1.5"/>
  <text x="125" y="158" text-anchor="middle" fill="#4ade80" font-size="14" font-weight="600">Researcher</text>
  <text x="125" y="178" text-anchor="middle" fill="#86efac" font-size="13">Web Search</text>

  <!-- Agent B (right) -->
  <rect x="490" y="130" width="130" height="70" rx="10" fill="#1e293b" stroke="#fb923c" stroke-width="1.5"/>
  <text x="555" y="158" text-anchor="middle" fill="#fb923c" font-size="14" font-weight="600">Writer</text>
  <text x="555" y="178" text-anchor="middle" fill="#fdba74" font-size="13">Summarize</text>

  <!-- Agent C (bottom-left) -->
  <rect x="100" y="260" width="130" height="70" rx="10" fill="#1e293b" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="165" y="288" text-anchor="middle" fill="#a78bfa" font-size="14" font-weight="600">Coder</text>
  <text x="165" y="308" text-anchor="middle" fill="#c4b5fd" font-size="13">Execute Code</text>

  <!-- Agent D (bottom-right) -->
  <rect x="450" y="260" width="130" height="70" rx="10" fill="#1e293b" stroke="#f472b6" stroke-width="1.5"/>
  <text x="515" y="288" text-anchor="middle" fill="#f472b6" font-size="14" font-weight="600">Reviewer</text>
  <text x="515" y="308" text-anchor="middle" fill="#f9a8d4" font-size="13">Quality Check</text>

  <!-- Connections: Orchestrator to Agents -->
  <line x1="298" y1="165" x2="195" y2="165" stroke="#475569" stroke-width="1.5" stroke-dasharray="6,3"/>
  <line x1="382" y1="165" x2="485" y2="165" stroke="#475569" stroke-width="1.5" stroke-dasharray="6,3"/>
  <line x1="318" y1="208" x2="195" y2="268" stroke="#475569" stroke-width="1.5" stroke-dasharray="6,3"/>
  <line x1="362" y1="208" x2="480" y2="268" stroke="#475569" stroke-width="1.5" stroke-dasharray="6,3"/>

  <!-- Framework comparison boxes -->
  <rect x="30" y="365" width="120" height="55" rx="8" fill="#1e293b" stroke="#38bdf8" stroke-width="1"/>
  <text x="90" y="388" text-anchor="middle" fill="#38bdf8" font-size="14" font-weight="600">CrewAI</text>
  <text x="90" y="406" text-anchor="middle" fill="#94a3b8" font-size="13">Role-based</text>

  <rect x="163" y="365" width="120" height="55" rx="8" fill="#1e293b" stroke="#4ade80" stroke-width="1"/>
  <text x="223" y="388" text-anchor="middle" fill="#4ade80" font-size="14" font-weight="600">AutoGen</text>
  <text x="223" y="406" text-anchor="middle" fill="#94a3b8" font-size="13">Conversation</text>

  <rect x="296" y="365" width="120" height="55" rx="8" fill="#1e293b" stroke="#fb923c" stroke-width="1"/>
  <text x="356" y="388" text-anchor="middle" fill="#fb923c" font-size="14" font-weight="600">LangGraph</text>
  <text x="356" y="406" text-anchor="middle" fill="#94a3b8" font-size="13">Graph-based</text>

  <rect x="529" y="365" width="120" height="55" rx="8" fill="#1e293b" stroke="#a78bfa" stroke-width="1"/>
  <text x="589" y="388" text-anchor="middle" fill="#a78bfa" font-size="14" font-weight="600">smolagents</text>
  <text x="589" y="406" text-anchor="middle" fill="#94a3b8" font-size="13">Code-first</text>

  <!-- Shared Tools bar -->
  <rect x="140" y="440" width="400" height="36" rx="8" fill="#0f172a" stroke="#475569" stroke-width="1"/>
  <text x="340" y="463" text-anchor="middle" fill="#cbd5e1" font-size="14" font-weight="500">Shared Tools: Search + Code + Files + APIs</text>

  <!-- Bottom attribution -->
  <g opacity="0.45">
    <text x="340" y="508" text-anchor="middle" fill="#64748b" font-family="-apple-system, system-ui, Arial, sans-serif" font-size="11" font-weight="600" letter-spacing="0.5px">osisdie.github.io · Local Agent Swarm Frameworks</text>
  </g>
</svg>
