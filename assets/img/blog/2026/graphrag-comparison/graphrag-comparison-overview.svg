<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <!-- layout: cream -->
  <rect width="1200" height="630" fill="#FDF6E3"/>

  <!-- Category (top-left) + accent rule -->
  <text x="100" y="92" font-family='"JetBrains Mono", "Consolas", "Menlo", monospace' font-size="18" font-weight="700" fill="#CB4B16" letter-spacing="2px">AI / GRAPHRAG</text>
  <line x1="100" y1="108" x2="188" y2="108" stroke="#CB4B16" stroke-width="3"/>

  <!-- Blog wordmark (top-right) -->
  <text x="1100" y="92" text-anchor="end" font-family='"JetBrains Mono", "Consolas", "Menlo", monospace' font-size="14" font-weight="500" fill="#93A1A1" letter-spacing="0.5px">Kevin&#8217;s Tech Blog</text>

  <!-- Headline (2 lines, left-aligned) -->
  <text x="100" y="255" font-family='-apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans TC", sans-serif' font-size="66" font-weight="800" fill="#073642" letter-spacing="-1px">Graphiti vs Neo4j</text>
  <text x="100" y="334" font-family='-apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans TC", sans-serif' font-size="66" font-weight="800" fill="#073642" letter-spacing="-1px">vs T-GRAG</text>

  <!-- Sub-hook -->
  <text x="100" y="405" font-family='-apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans TC", sans-serif' font-size="26" font-weight="500" fill="#586E75">9 dimensions that shape long-term RAG.</text>
  <!-- Anchor: chips (3 items) -->
  <g>
    <rect x="302" y="475" width="180" height="56" rx="14" fill="#CB4B16" stroke="#CB4B16" stroke-width="3"/>
    <text x="392" y="508" text-anchor="middle" font-family='"JetBrains Mono", "Consolas", "Menlo", monospace' font-size="14" font-weight="700" fill="#FDF6E3" letter-spacing="1px">GRAPHITI</text>
    <rect x="510" y="475" width="180" height="56" rx="14" fill="none" stroke="#CB4B16" stroke-width="3"/>
    <text x="600" y="508" text-anchor="middle" font-family='"JetBrains Mono", "Consolas", "Menlo", monospace' font-size="14" font-weight="700" fill="#CB4B16" letter-spacing="1px">NEO4J</text>
    <rect x="718" y="475" width="180" height="56" rx="14" fill="none" stroke="#CB4B16" stroke-width="3"/>
    <text x="808" y="508" text-anchor="middle" font-family='"JetBrains Mono", "Consolas", "Menlo", monospace' font-size="14" font-weight="700" fill="#CB4B16" letter-spacing="1px">T-GRAG</text>
  </g>

  <!-- Meta (bottom-left) -->
  <text x="100" y="585" font-family='"JetBrains Mono", "Consolas", "Menlo", monospace' font-size="16" font-weight="500" fill="#93A1A1" letter-spacing="0.5px">@osisdie &#183; 2026.04</text>
  <!-- Bottom attribution -->
  <g opacity="0.45">
    <text x="600" y="618" text-anchor="middle" fill="#64748b" font-family="Segoe UI, Arial, sans-serif" font-size="11" font-weight="600" letter-spacing="0.5px">osisdie.github.io · GraphRAG Framework Comparison</text>
  </g>
