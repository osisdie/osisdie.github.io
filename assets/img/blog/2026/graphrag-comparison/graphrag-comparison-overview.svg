<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#22c55e"/>
      <stop offset="100%" style="stop-color:#16a34a"/>
    </linearGradient>
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6"/>
      <stop offset="100%" style="stop-color:#2563eb"/>
    </linearGradient>
    <linearGradient id="orangeGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b"/>
      <stop offset="100%" style="stop-color:#d97706"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Title -->
  <text x="600" y="68" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="32" font-weight="700" fill="#e2e8f0">GraphRAG Framework Comparison</text>

  <!-- Subtitle -->
  <text x="600" y="100" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="16" font-weight="600" fill="#94a3b8">9 Dimensions · Long-term RAG Infrastructure · 2026</text>

  <!-- Divider line -->
  <line x1="200" y1="120" x2="1000" y2="120" stroke="#334155" stroke-width="1"/>

  <!-- === Column 1: Graphiti (Left) === -->
  <g transform="translate(200, 165)">
    <!-- Card background -->
    <rect x="-120" y="-30" width="240" height="390" rx="16" fill="#0f172a" stroke="#22c55e" stroke-width="2" opacity="0.9"/>

    <!-- Graph icon -->
    <circle cx="0" cy="30" r="12" fill="url(#greenGrad)"/>
    <circle cx="-35" cy="65" r="8" fill="#22c55e" opacity="0.7"/>
    <circle cx="35" cy="65" r="8" fill="#22c55e" opacity="0.7"/>
    <line x1="0" y1="42" x2="-35" y2="57" stroke="#22c55e" stroke-width="1.5" opacity="0.6"/>
    <line x1="0" y1="42" x2="35" y2="57" stroke="#22c55e" stroke-width="1.5" opacity="0.6"/>

    <!-- Title -->
    <text x="0" y="115" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="24" font-weight="700" fill="#f0fdf4">Graphiti</text>

    <!-- Tagline -->
    <text x="0" y="140" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="600" fill="#94a3b8">Agent Long-term Memory</text>
    <text x="0" y="160" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="600" fill="#94a3b8">Bi-temporal · Zero Migration</text>

    <!-- Key strengths -->
    <rect x="-95" y="190" width="190" height="22" rx="4" fill="#22c55e" opacity="0.15"/>
    <text x="0" y="206" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="11" font-weight="700" fill="#4ade80">Swap Embedder = No Re-ingest</text>
    <rect x="-95" y="218" width="190" height="22" rx="4" fill="#22c55e" opacity="0.15"/>
    <text x="0" y="234" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="11" font-weight="700" fill="#4ade80">Auto Fact Invalidation</text>
    <rect x="-95" y="246" width="190" height="22" rx="4" fill="#22c55e" opacity="0.15"/>
    <text x="0" y="262" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="11" font-weight="700" fill="#4ade80">Pluggable Graph Backend</text>

    <!-- Badge -->
    <rect x="-72" y="284" width="144" height="28" rx="14" fill="url(#greenGrad)"/>
    <text x="0" y="303" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="700" fill="#052e16">Long-term Memory</text>
  </g>

  <!-- === Column 2: Neo4j (Center) === -->
  <g transform="translate(600, 165)">
    <!-- Card background -->
    <rect x="-120" y="-30" width="240" height="390" rx="16" fill="#0f172a" stroke="#3b82f6" stroke-width="2" opacity="0.9"/>

    <!-- Cylinder + graph icon -->
    <ellipse cx="0" cy="25" rx="28" ry="9" fill="none" stroke="#3b82f6" stroke-width="2"/>
    <rect x="-28" y="25" width="56" height="35" fill="#0f172a" stroke="none"/>
    <line x1="-28" y1="25" x2="-28" y2="60" stroke="#3b82f6" stroke-width="2"/>
    <line x1="28" y1="25" x2="28" y2="60" stroke="#3b82f6" stroke-width="2"/>
    <ellipse cx="0" cy="60" rx="28" ry="9" fill="none" stroke="#3b82f6" stroke-width="2"/>

    <!-- Title -->
    <text x="0" y="115" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="24" font-weight="700" fill="#dbeafe">Neo4j</text>

    <!-- Tagline -->
    <text x="0" y="140" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="600" fill="#94a3b8">Enterprise Graph DB</text>
    <text x="0" y="160" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="600" fill="#94a3b8">Full Control · Mature Ecosystem</text>

    <!-- Key strengths -->
    <rect x="-95" y="190" width="190" height="22" rx="4" fill="#3b82f6" opacity="0.15"/>
    <text x="0" y="206" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="11" font-weight="700" fill="#93c5fd">Most Mature Ecosystem</text>
    <rect x="-95" y="218" width="190" height="22" rx="4" fill="#3b82f6" opacity="0.15"/>
    <text x="0" y="234" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="11" font-weight="700" fill="#93c5fd">HybridCypherRetriever</text>
    <rect x="-95" y="246" width="190" height="22" rx="4" fill="#3b82f6" opacity="0.15"/>
    <text x="0" y="262" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="11" font-weight="700" fill="#93c5fd">Full Cypher Control</text>

    <!-- Badge -->
    <rect x="-52" y="284" width="104" height="28" rx="14" fill="transparent" stroke="#3b82f6" stroke-width="1.5"/>
    <text x="0" y="303" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="700" fill="#93c5fd">Enterprise</text>
  </g>

  <!-- === Column 3: T-GRAG (Right) === -->
  <g transform="translate(1000, 165)">
    <!-- Card background -->
    <rect x="-120" y="-30" width="240" height="390" rx="16" fill="#0f172a" stroke="#f59e0b" stroke-width="2" opacity="0.9"/>

    <!-- Clock icon -->
    <circle cx="0" cy="40" r="26" fill="none" stroke="#f59e0b" stroke-width="2"/>
    <line x1="0" y1="40" x2="0" y2="26" stroke="#f59e0b" stroke-width="2.5"/>
    <line x1="0" y1="40" x2="12" y2="40" stroke="#f59e0b" stroke-width="2.5"/>

    <!-- Title -->
    <text x="0" y="115" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="24" font-weight="700" fill="#fef3c7">T-GRAG</text>

    <!-- Tagline -->
    <text x="0" y="140" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="600" fill="#94a3b8">Temporal GraphRAG</text>
    <text x="0" y="160" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="600" fill="#94a3b8">Research · 3-Layer Retriever</text>

    <!-- Key strengths -->
    <rect x="-95" y="190" width="190" height="22" rx="4" fill="#f59e0b" opacity="0.15"/>
    <text x="0" y="206" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="11" font-weight="700" fill="#fcd34d">Best Temporal Concepts</text>
    <rect x="-95" y="218" width="190" height="22" rx="4" fill="#f59e0b" opacity="0.15"/>
    <text x="0" y="234" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="11" font-weight="700" fill="#fcd34d">3-Layer Temporal Retriever</text>
    <rect x="-95" y="246" width="190" height="22" rx="4" fill="#f59e0b" opacity="0.15"/>
    <text x="0" y="262" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="11" font-weight="700" fill="#fcd34d">Flexible DB Backend</text>

    <!-- Badge -->
    <rect x="-46" y="284" width="92" height="28" rx="14" fill="transparent" stroke="#f59e0b" stroke-width="1.5"/>
    <text x="0" y="303" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="700" fill="#fcd34d">Research</text>
  </g>

  <!-- VS connectors -->
  <text x="400" y="360" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="20" font-weight="700" fill="#475569">vs</text>
  <text x="800" y="360" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="20" font-weight="700" fill="#475569">vs</text>

  <!-- Bottom tech keywords -->
  <text x="600" y="580" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="600" fill="#64748b">Temporal · Hybrid Search · Embedding Migration · Knowledge Graph · Production RAG</text>

  <!-- Bottom attribution -->
  <g opacity="0.45">
    <text x="600" y="618" text-anchor="middle" fill="#64748b" font-family="Segoe UI, Arial, sans-serif" font-size="11" font-weight="600" letter-spacing="0.5px">osisdie.github.io · GraphRAG Comparison</text>
  </g>
</svg>
