<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 540" font-family="-apple-system, system-ui, Arial, sans-serif">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#1e293b;stop-opacity:1"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.4"/>
    </filter>
    <marker id="arrCyan" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#22d3ee"/>
    </marker>
    <marker id="arrPurple" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#a78bfa"/>
    </marker>
    <marker id="arrGreen" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#34d399"/>
    </marker>
    <marker id="arrYellow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#fbbf24"/>
    </marker>
    <marker id="arrBlue" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#60a5fa"/>
    </marker>
    <marker id="arrOrange" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#fb923c"/>
    </marker>
    <marker id="arrRed" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#f87171"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1000" height="540" fill="url(#bgGrad)" rx="12"/>

  <!-- Grid -->
  <g opacity="0.04" stroke="#fff" stroke-width="0.5">
    <line x1="0" y1="100" x2="1000" y2="100"/><line x1="0" y1="200" x2="1000" y2="200"/>
    <line x1="0" y1="300" x2="1000" y2="300"/><line x1="0" y1="400" x2="1000" y2="400"/>
    <line x1="200" y1="0" x2="200" y2="540"/><line x1="400" y1="0" x2="400" y2="540"/>
    <line x1="600" y1="0" x2="600" y2="540"/><line x1="800" y1="0" x2="800" y2="540"/>
  </g>

  <!-- Title -->
  <text x="500" y="38" text-anchor="middle" fill="#fff" font-size="22" font-weight="700" letter-spacing="0.5">IoT 1M Device Architecture</text>
  <text x="500" y="58" text-anchor="middle" fill="#94a3b8" font-size="12">Phase 1: EMQX + TimescaleDB + FastAPI + BFF (1M Device Real-time IoT)</text>

  <!-- ===== CORE FLOW (top row) ===== -->

  <!-- Layer 1: Devices -->
  <g filter="url(#shadow)">
    <rect x="25" y="85" width="130" height="185" rx="12" fill="#0c2d48" stroke="#22d3ee" stroke-width="1.5"/>
  </g>
  <rect x="42" y="102" width="96" height="28" rx="5" fill="#164e63" stroke="#22d3ee" stroke-width="1"/>
  <circle cx="56" cy="116" r="5" fill="#22d3ee" opacity="0.6"/>
  <text x="72" y="120" fill="#67e8f9" font-size="11">Sensor A</text>
  <rect x="42" y="136" width="96" height="28" rx="5" fill="#164e63" stroke="#22d3ee" stroke-width="1"/>
  <circle cx="56" cy="150" r="5" fill="#22d3ee" opacity="0.6"/>
  <text x="72" y="154" fill="#67e8f9" font-size="11">Sensor B</text>
  <text x="90" y="182" text-anchor="middle" fill="#67e8f9" font-size="14">...</text>
  <text x="90" y="205" text-anchor="middle" fill="#fff" font-size="13" font-weight="600">1M Devices</text>
  <text x="90" y="222" text-anchor="middle" fill="#67e8f9" font-size="11">mTLS + X.509</text>
  <rect x="52" y="232" width="76" height="18" rx="3" fill="#164e63" stroke="#22d3ee" stroke-width="0.8"/>
  <text x="90" y="245" text-anchor="middle" fill="#22d3ee" font-size="11">Cert Rotation</text>

  <!-- Layer 2: EMQX -->
  <g filter="url(#shadow)">
    <rect x="200" y="90" width="150" height="170" rx="12" fill="#1e1145" stroke="#a78bfa" stroke-width="1.5"/>
  </g>
  <circle cx="275" cy="125" r="20" fill="none" stroke="#a78bfa" stroke-width="2"/>
  <text x="275" y="131" text-anchor="middle" fill="#a78bfa" font-size="13" font-weight="700">E</text>
  <text x="275" y="165" text-anchor="middle" fill="#fff" font-size="14" font-weight="600">EMQX</text>
  <text x="275" y="182" text-anchor="middle" fill="#a78bfa" font-size="11">MQTT v5 Broker</text>
  <text x="275" y="198" text-anchor="middle" fill="#7c3aed" font-size="11">3-5 node cluster</text>
  <!-- Rule Engine badge -->
  <rect x="215" y="210" width="120" height="18" rx="4" fill="#2d1a5e" stroke="#7c3aed" stroke-width="1"/>
  <text x="275" y="223" text-anchor="middle" fill="#c4b5fd" font-size="11">Rule Engine</text>
  <!-- Rate limit + ACL -->
  <rect x="215" y="232" width="120" height="18" rx="4" fill="#2d1a5e" stroke="#7c3aed" stroke-width="1"/>
  <text x="275" y="245" text-anchor="middle" fill="#c4b5fd" font-size="11">Rate Limit + ACL</text>

  <!-- Layer 3: TimescaleDB -->
  <g filter="url(#shadow)">
    <rect x="400" y="90" width="155" height="170" rx="12" fill="#0a2e1e" stroke="#34d399" stroke-width="1.5"/>
  </g>
  <circle cx="477" cy="125" r="20" fill="none" stroke="#34d399" stroke-width="2"/>
  <text x="477" y="131" text-anchor="middle" fill="#34d399" font-size="13" font-weight="700">T</text>
  <text x="477" y="165" text-anchor="middle" fill="#fff" font-size="14" font-weight="600">TimescaleDB</text>
  <text x="477" y="182" text-anchor="middle" fill="#34d399" font-size="11">Hot Storage (7 days)</text>
  <text x="477" y="198" text-anchor="middle" fill="#6ee7b7" font-size="11">100K writes/sec</text>
  <!-- Continuous Agg badge -->
  <rect x="413" y="210" width="128" height="18" rx="4" fill="#164e3a" stroke="#34d399" stroke-width="1"/>
  <text x="477" y="223" text-anchor="middle" fill="#6ee7b7" font-size="11">Continuous Agg</text>
  <!-- Cold tier (visually distinct from Hot) -->
  <rect x="413" y="232" width="128" height="18" rx="4" fill="#12121e" stroke="#64748b" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="477" y="245" text-anchor="middle" fill="#94a3b8" font-size="11">Cold: ClickHouse + S3</text>

  <!-- Layer 4a: FastAPI Backend -->
  <g filter="url(#shadow)">
    <rect x="605" y="90" width="115" height="120" rx="12" fill="#2a1a0e" stroke="#fbbf24" stroke-width="1.5"/>
  </g>
  <text x="662" y="115" text-anchor="middle" fill="#fff" font-size="13" font-weight="600">FastAPI</text>
  <text x="662" y="132" text-anchor="middle" fill="#fbbf24" font-size="11">Backend</text>
  <rect x="618" y="142" width="90" height="18" rx="3" fill="#0d0d0d" stroke="#333" stroke-width="1"/>
  <text x="663" y="155" text-anchor="middle" fill="#fbbf24" font-size="11">Device + RBAC</text>
  <rect x="618" y="164" width="90" height="18" rx="3" fill="#0d0d0d" stroke="#333" stroke-width="1"/>
  <text x="663" y="177" text-anchor="middle" fill="#34d399" font-size="11">Telemetry API</text>
  <rect x="618" y="186" width="90" height="18" rx="3" fill="#0d0d0d" stroke="#333" stroke-width="1"/>
  <text x="663" y="199" text-anchor="middle" fill="#fb923c" font-size="11">Command API</text>

  <!-- Layer 4b: BFF -->
  <g filter="url(#shadow)">
    <rect x="605" y="222" width="115" height="60" rx="10" fill="#1a1e2e" stroke="#818cf8" stroke-width="1.5"/>
  </g>
  <text x="662" y="242" text-anchor="middle" fill="#fff" font-size="12" font-weight="600">BFF</text>
  <text x="662" y="258" text-anchor="middle" fill="#a5b4fc" font-size="11">WebSocket Mgmt</text>
  <text x="662" y="273" text-anchor="middle" fill="#818cf8" font-size="11">API Aggregation</text>

  <!-- Dashboard box right of BFF -->
  <rect x="730" y="222" width="62" height="60" rx="8" fill="#1e293b" stroke="#60a5fa" stroke-width="1"/>
  <text x="761" y="244" text-anchor="middle" fill="#60a5fa" font-size="11" font-weight="600">UI</text>
  <polyline points="738,260 745,254 752,257 759,250 766,253 773,248 780,251" fill="none" stroke="#60a5fa" stroke-width="1.5"/>
  <circle cx="780" cy="251" r="2" fill="#60a5fa">
    <animate attributeName="opacity" values="1;0.3;1" dur="2s" repeatCount="indefinite"/>
  </circle>
  <text x="761" y="276" text-anchor="middle" fill="#475569" font-size="11">Web/Mobile</text>

  <!-- ===== MONITORING LAYER (right column) ===== -->
  <g filter="url(#shadow)">
    <rect x="805" y="85" width="170" height="180" rx="12" fill="#1a0e0e" stroke="#f87171" stroke-width="1.5"/>
  </g>
  <text x="890" y="108" text-anchor="middle" fill="#f87171" font-size="12" font-weight="600">Observability</text>

  <!-- Prometheus -->
  <rect x="820" y="118" width="140" height="22" rx="4" fill="#2a1515" stroke="#fb923c" stroke-width="1"/>
  <circle cx="834" cy="129" r="5" fill="#fb923c"/>
  <text x="845" y="133" fill="#fdba74" font-size="11">Prometheus</text>

  <!-- Grafana -->
  <rect x="820" y="146" width="140" height="22" rx="4" fill="#1a2a15" stroke="#34d399" stroke-width="1"/>
  <circle cx="834" cy="157" r="5" fill="#34d399"/>
  <text x="845" y="161" fill="#6ee7b7" font-size="11">Grafana Dashboard</text>

  <!-- OpenTelemetry -->
  <rect x="820" y="174" width="140" height="22" rx="4" fill="#1a1a2e" stroke="#818cf8" stroke-width="1"/>
  <circle cx="834" cy="185" r="5" fill="#818cf8"/>
  <text x="845" y="189" fill="#a5b4fc" font-size="11">OpenTelemetry</text>

  <!-- Alerting -->
  <rect x="820" y="202" width="140" height="22" rx="4" fill="#2a1a1a" stroke="#f87171" stroke-width="1"/>
  <text x="836" y="217" fill="#fca5a5" font-size="13">!</text>
  <text x="845" y="217" fill="#fca5a5" font-size="11">Alerting (PagerDuty)</text>

  <!-- Jaeger / Loki -->
  <rect x="820" y="230" width="68" height="22" rx="4" fill="#1e1a2e" stroke="#c084fc" stroke-width="1"/>
  <text x="854" y="245" text-anchor="middle" fill="#d8b4fe" font-size="11">Jaeger</text>
  <rect x="892" y="230" width="68" height="22" rx="4" fill="#1a1e2e" stroke="#93c5fd" stroke-width="1"/>
  <text x="926" y="245" text-anchor="middle" fill="#bfdbfe" font-size="11">Loki</text>

  <!-- ===== CORE FLOW ARROWS ===== -->

  <!-- Device → EMQX -->
  <line x1="155" y1="170" x2="200" y2="170" stroke="#22d3ee" stroke-width="2" marker-end="url(#arrCyan)"/>
  <text x="177" y="162" text-anchor="middle" fill="#67e8f9" font-size="11">MQTT</text>

  <!-- EMQX → TimescaleDB -->
  <line x1="350" y1="170" x2="400" y2="170" stroke="#a78bfa" stroke-width="2" marker-end="url(#arrPurple)"/>
  <text x="375" y="162" text-anchor="middle" fill="#c4b5fd" font-size="11">Rule</text>

  <!-- TimescaleDB → FastAPI Backend -->
  <line x1="555" y1="170" x2="605" y2="170" stroke="#34d399" stroke-width="2" marker-end="url(#arrGreen)"/>
  <text x="580" y="162" text-anchor="middle" fill="#6ee7b7" font-size="11">SQL</text>

  <!-- FastAPI Backend → BFF -->
  <line x1="662" y1="210" x2="662" y2="222" stroke="#818cf8" stroke-width="1.5" marker-end="url(#arrPurple)"/>

  <!-- BFF → Dashboard UI -->
  <line x1="720" y1="252" x2="730" y2="252" stroke="#60a5fa" stroke-width="1.5" marker-end="url(#arrBlue)"/>

  <!-- FastAPI → Monitoring -->
  <line x1="720" y1="140" x2="805" y2="140" stroke="#f87171" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrRed)"/>

  <!-- EMQX → Monitoring -->
  <path d="M 275 90 Q 275 75 890 75 Q 890 75 890 85" fill="none" stroke="#fb923c" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arrOrange)"/>
  <text x="580" y="72" text-anchor="middle" fill="#fb923c" font-size="12" font-weight="500">metrics + traces</text>

  <!-- Reverse command: BFF → Backend → EMQX (dashed) -->
  <path d="M 605 270 Q 400 315 275 260" fill="none" stroke="#fbbf24" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#arrYellow)"/>
  <text x="420" y="302" text-anchor="middle" fill="#fde68a" font-size="11">cmd/{device-id} (reverse command)</text>

  <!-- ===== BOTTOM: Multi-tenant + Scale note ===== -->

  <!-- Multi-tenant bar -->
  <rect x="25" y="330" width="950" height="32" rx="8" fill="#1e293b" stroke="#475569" stroke-width="1"/>
  <text x="500" y="351" text-anchor="middle" fill="#94a3b8" font-size="11">Multi-Tenant: Topic ACL + PostgreSQL RLS + RBAC (Super Admin / Tenant Admin / Operator / Viewer)</text>

  <!-- Scale-out hint -->
  <rect x="25" y="375" width="950" height="68" rx="10" fill="#0f172a" stroke="#475569" stroke-width="1" stroke-dasharray="5,4"/>
  <text x="500" y="397" text-anchor="middle" fill="#64748b" font-size="12" font-weight="600">Scale-Out Options (10M+ devices)</text>

  <!-- Redpanda chip -->
  <rect x="50" y="408" width="130" height="24" rx="5" fill="#2d1533" stroke="#ec4899" stroke-width="1"/>
  <text x="115" y="424" text-anchor="middle" fill="#f9a8d4" font-size="11">+ Redpanda (Kafka)</text>

  <!-- ClickHouse chip -->
  <rect x="195" y="408" width="130" height="24" rx="5" fill="#1a1a0e" stroke="#fbbf24" stroke-width="1"/>
  <text x="260" y="424" text-anchor="middle" fill="#fde68a" font-size="11">+ ClickHouse OLAP</text>

  <!-- Flink chip -->
  <rect x="340" y="408" width="130" height="24" rx="5" fill="#1a1e2e" stroke="#60a5fa" stroke-width="1"/>
  <text x="405" y="424" text-anchor="middle" fill="#93c5fd" font-size="11">+ Flink CEP</text>

  <!-- Multi-region chip -->
  <rect x="485" y="408" width="140" height="24" rx="5" fill="#1a2e1e" stroke="#34d399" stroke-width="1"/>
  <text x="555" y="424" text-anchor="middle" fill="#6ee7b7" font-size="11">+ Multi-Region DR</text>

  <!-- FastStream chip -->
  <rect x="640" y="408" width="148" height="24" rx="5" fill="#1e1a2e" stroke="#a78bfa" stroke-width="1"/>
  <text x="714" y="424" text-anchor="middle" fill="#c4b5fd" font-size="11">+ FastStream / Benthos</text>

  <!-- Edge chip -->
  <rect x="803" y="408" width="148" height="24" rx="5" fill="#0c2d48" stroke="#22d3ee" stroke-width="1"/>
  <text x="877" y="424" text-anchor="middle" fill="#67e8f9" font-size="11">+ Edge Gateway Agg</text>

  <!-- Phase labels -->
  <text x="25" y="468" fill="#475569" font-size="11">Phase 1: EMQX + TimescaleDB + FastAPI (Day 1)</text>
  <text x="400" y="468" fill="#475569" font-size="11">Phase 2: + Streaming + Dedup (Month 3)</text>
  <text x="720" y="468" fill="#475569" font-size="11">Phase 3: + OLAP + DR (Month 5+)</text>

  <!-- Layer labels -->
  <text x="90" y="80" text-anchor="middle" fill="#67e8f9" font-size="11" font-weight="600">Edge</text>
  <text x="275" y="80" text-anchor="middle" fill="#c4b5fd" font-size="11" font-weight="600">Broker</text>
  <text x="477" y="80" text-anchor="middle" fill="#6ee7b7" font-size="11" font-weight="600">Storage</text>
  <text x="690" y="80" text-anchor="middle" fill="#fde68a" font-size="11" font-weight="600">Backend + BFF + UI</text>
  <text x="890" y="80" text-anchor="middle" fill="#fca5a5" font-size="11" font-weight="600">Monitoring</text>

  <!-- Bottom attribution -->
  <text x="500" y="525" text-anchor="middle" fill="#334455" font-size="11">osisdie.github.io</text>
</svg>
