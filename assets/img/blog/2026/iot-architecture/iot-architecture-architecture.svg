<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <!-- layout: hybrid -->
  <defs>
    <linearGradient id="transitionGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f1f5f9"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
    <linearGradient id="detailBgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.12"/>
    </filter>
    <marker id="arrRight" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#94a3b8"/>
    </marker>
  </defs>

  <!-- === BACKGROUND === -->
  <rect width="1200" height="630" fill="#ffffff"/>
  <rect y="390" width="1200" height="240" fill="url(#detailBgGrad)"/>
  <rect y="370" width="1200" height="30" fill="url(#transitionGrad)"/>

  <!-- === HEAD ZONE === -->
  <text x="600" y="68" text-anchor="middle"
        font-family="-apple-system, BlinkMacSystemFont, Segoe UI, Noto Sans TC, sans-serif"
        font-size="32" font-weight="700" fill="#1e293b">
    IoT 1M Device Architecture
  </text>
  <text x="600" y="105" text-anchor="middle"
        font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif"
        font-size="18" font-weight="600" fill="#475569">
    EMQX + TimescaleDB + FastAPI + BFF
  </text>
  <line x1="300" y1="125" x2="900" y2="125" stroke="#e2e8f0" stroke-width="1.5"/>

  <!-- 5 layer cards in a flow -->
  <!-- Devices -->
  <g transform="translate(140, 240)">
    <rect x="-95" y="-70" width="190" height="170" rx="14" fill="#a5f3fc" stroke="#0891b2" stroke-width="3"/>
    <text x="0" y="-32" text-anchor="middle" font-family="sans-serif" font-size="20" font-weight="700" fill="#155e75">1M Devices</text>
    <text x="0" y="-8" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="600" fill="#0e7490">MQTT v5 + mTLS</text>
    <text x="0" y="16" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="600" fill="#0e7490">X.509 Certificates</text>
    <rect x="-36" y="32" width="72" height="22" rx="11" fill="#0891b2"/>
    <text x="0" y="48" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="700" fill="#fff">Edge</text>
  </g>

  <!-- Arrow -->
  <line x1="240" y1="240" x2="280" y2="240" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrRight)"/>

  <!-- EMQX -->
  <g transform="translate(370, 240)">
    <rect x="-95" y="-70" width="190" height="170" rx="14" fill="#ddd6fe" stroke="#7c3aed" stroke-width="3"/>
    <text x="0" y="-32" text-anchor="middle" font-family="sans-serif" font-size="20" font-weight="700" fill="#5b21b6">EMQX</text>
    <text x="0" y="-8" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="600" fill="#6d28d9">3-5 Node Cluster</text>
    <text x="0" y="16" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="600" fill="#6d28d9">Rule Engine + ACL</text>
    <rect x="-40" y="32" width="80" height="22" rx="11" fill="#7c3aed"/>
    <text x="0" y="48" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="700" fill="#fff">Broker</text>
  </g>

  <!-- Arrow -->
  <line x1="470" y1="240" x2="510" y2="240" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrRight)"/>

  <!-- TimescaleDB -->
  <g transform="translate(600, 240)">
    <rect x="-95" y="-70" width="190" height="170" rx="14" fill="#bbf7d0" stroke="#16a34a" stroke-width="3"/>
    <text x="0" y="-32" text-anchor="middle" font-family="sans-serif" font-size="20" font-weight="700" fill="#166534">TimescaleDB</text>
    <text x="0" y="-8" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="600" fill="#15803d">100K writes/sec</text>
    <text x="0" y="16" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="600" fill="#15803d">Hot 7d + Cold S3</text>
    <rect x="-44" y="32" width="88" height="22" rx="11" fill="#16a34a"/>
    <text x="0" y="48" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="700" fill="#fff">Storage</text>
  </g>

  <!-- Arrow -->
  <line x1="700" y1="240" x2="740" y2="240" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrRight)"/>

  <!-- FastAPI + BFF -->
  <g transform="translate(830, 240)">
    <rect x="-95" y="-70" width="190" height="170" rx="14" fill="#fde68a" stroke="#d97706" stroke-width="3"/>
    <text x="0" y="-32" text-anchor="middle" font-family="sans-serif" font-size="20" font-weight="700" fill="#92400e">FastAPI + BFF</text>
    <text x="0" y="-8" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="600" fill="#b45309">Device RBAC</text>
    <text x="0" y="16" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="600" fill="#b45309">WebSocket + API Agg</text>
    <rect x="-44" y="32" width="88" height="22" rx="11" fill="#d97706"/>
    <text x="0" y="48" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="700" fill="#fff">Backend</text>
  </g>

  <!-- Arrow -->
  <line x1="930" y1="240" x2="970" y2="240" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrRight)"/>

  <!-- Observability -->
  <g transform="translate(1060, 240)">
    <rect x="-95" y="-70" width="190" height="170" rx="14" fill="#fecaca" stroke="#dc2626" stroke-width="3"/>
    <text x="0" y="-32" text-anchor="middle" font-family="sans-serif" font-size="20" font-weight="700" fill="#991b1b">Observability</text>
    <text x="0" y="-8" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="600" fill="#b91c1c">Prometheus + Grafana</text>
    <text x="0" y="16" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="600" fill="#b91c1c">OpenTelemetry</text>
    <rect x="-48" y="32" width="96" height="22" rx="11" fill="#dc2626"/>
    <text x="0" y="48" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="700" fill="#fff">Monitoring</text>
  </g>

  <!-- === DETAIL ZONE: Scale-out phases with purpose === -->
  <text x="600" y="420" text-anchor="middle"
        font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif"
        font-size="16" font-weight="700" fill="#cbd5e1">Scale-Out Roadmap</text>

  <rect x="60" y="436" width="345" height="52" rx="8" fill="#0f172a" stroke="#22c55e" stroke-width="1.5"/>
  <text x="232" y="457" text-anchor="middle" font-family="sans-serif" font-size="15" font-weight="700" fill="#4ade80">Phase 1: EMQX + TimescaleDB + FastAPI</text>
  <text x="232" y="477" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="600" fill="#94a3b8">Day 1 production stack</text>

  <rect x="428" y="436" width="345" height="52" rx="8" fill="#0f172a" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="600" y="457" text-anchor="middle" font-family="sans-serif" font-size="15" font-weight="700" fill="#fcd34d">Phase 2: + Redpanda + Dedup</text>
  <text x="600" y="477" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="600" fill="#94a3b8">Stream processing + dedup</text>

  <rect x="796" y="436" width="345" height="52" rx="8" fill="#0f172a" stroke="#ef4444" stroke-width="1.5"/>
  <text x="968" y="457" text-anchor="middle" font-family="sans-serif" font-size="15" font-weight="700" fill="#f87171">Phase 3: + ClickHouse + DR</text>
  <text x="968" y="477" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="600" fill="#94a3b8">OLAP analytics + disaster recovery</text>

  <!-- Multi-tenant bar -->
  <rect x="150" y="508" width="900" height="36" rx="8" fill="#1e293b" stroke="#475569" stroke-width="1"/>
  <text x="600" y="531" text-anchor="middle"
        font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif"
        font-size="15" font-weight="600" fill="#cbd5e1">Multi-Tenant: Topic ACL + PostgreSQL RLS + RBAC</text>

  <!-- Bottom attribution -->
  <g opacity="0.45">
    <text x="600" y="618" text-anchor="middle" fill="#64748b" font-family="Segoe UI, Arial, sans-serif" font-size="11" font-weight="600" letter-spacing="0.5px">osisdie.github.io · IoT Architecture</text>
  </g>
</svg>
