    <text x="444" y="508" text-anchor="middle" font-family='"JetBrains Mono", "Consolas", "Menlo", monospace' font-size="14" font-weight="700" fill="#CB4B16" letter-spacing="1px">DENSE</text>
    <rect x="530" y="475" width="140" height="56" rx="14" fill="none" stroke="#CB4B16" stroke-width="3"/>
    <text x="600" y="508" text-anchor="middle" font-family='"JetBrains Mono", "Consolas", "Menlo", monospace' font-size="14" font-weight="700" fill="#CB4B16" letter-spacing="1px">CRAG</text>
