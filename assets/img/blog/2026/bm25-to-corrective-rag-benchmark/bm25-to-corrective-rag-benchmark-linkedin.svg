<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <!-- layout: cream -->
  <rect width="1200" height="630" fill="#FDF6E3"/>

  <!-- Category (top-left) + accent rule -->
  <text x="100" y="92" font-family='"JetBrains Mono", "Consolas", "Menlo", monospace' font-size="18" font-weight="700" fill="#CB4B16" letter-spacing="2px">RAG · PAPER REVIEW</text>
  <line x1="100" y1="108" x2="188" y2="108" stroke="#CB4B16" stroke-width="3"/>

  <!-- Blog wordmark (top-right) -->
  <text x="1100" y="92" text-anchor="end" font-family='"JetBrains Mono", "Consolas", "Menlo", monospace' font-size="14" font-weight="500" fill="#93A1A1" letter-spacing="0.5px">Kevin&#8217;s Tech Blog</text>

  <!-- Headline (2 lines) -->
  <text x="100" y="225" font-family='-apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans TC", sans-serif' font-size="68" font-weight="800" fill="#073642" letter-spacing="-1px">From BM25 to</text>
  <text x="100" y="305" font-family='-apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans TC", sans-serif' font-size="68" font-weight="800" fill="#073642" letter-spacing="-1px">Corrective RAG</text>

  <!-- Sub-hook -->
  <text x="100" y="365" font-family='-apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans TC", sans-serif' font-size="24" font-weight="500" fill="#586E75">Reading notes on a 23,088-query text + table retrieval benchmark.</text>

  <!-- Punchline number -->
  <g transform="translate(100, 460)">
    <rect x="0" y="-40" width="520" height="78" rx="12" fill="#073642"/>
    <text x="24" y="-7" font-family='"JetBrains Mono", "Consolas", "Menlo", monospace' font-size="14" font-weight="600" fill="#93A1A1" letter-spacing="1px">HYBRID + RERANK</text>
    <text x="24" y="22" font-family='-apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif' font-size="28" font-weight="800" fill="#FDF6E3">R@5 = 0.816 · MRR@3 = 0.605</text>
  </g>

  <!-- Side label -->
  <text x="650" y="436" font-family='-apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif' font-size="20" font-weight="700" fill="#073642">+12.1pp Recall@5</text>
  <text x="650" y="464" font-family='-apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif' font-size="20" font-weight="700" fill="#073642">+17.2pp MRR@3</text>
  <text x="650" y="494" font-family='-apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans TC", sans-serif' font-size="16" font-weight="500" fill="#586E75">over unranked Hybrid RRF</text>

  <!-- Meta (bottom-left) -->
  <text x="100" y="585" font-family='"JetBrains Mono", "Consolas", "Menlo", monospace' font-size="16" font-weight="500" fill="#93A1A1" letter-spacing="0.5px">@osisdie &#183; 2026.04.27 &#183; arXiv:2604.01733</text>

  <!-- Bottom attribution -->
  <g opacity="0.45">
    <text x="600" y="618" text-anchor="middle" fill="#64748b" font-family="Segoe UI, Arial, sans-serif" font-size="11" font-weight="600" letter-spacing="0.5px">osisdie.github.io · From BM25 to Corrective RAG</text>
  </g>
