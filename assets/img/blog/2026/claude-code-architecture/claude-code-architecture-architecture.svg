<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <!-- layout: hybrid -->
  <defs>
    <linearGradient id="transitionGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f1f5f9"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
    <linearGradient id="detailBgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.12"/>
    </filter>
  </defs>

  <!-- === BACKGROUND === -->
  <rect width="1200" height="630" fill="#ffffff"/>
  <rect y="390" width="1200" height="240" fill="url(#detailBgGrad)"/>
  <rect y="370" width="1200" height="30" fill="url(#transitionGrad)"/>

  <!-- === HEAD ZONE === -->
  <text x="600" y="68" text-anchor="middle"
        font-family="-apple-system, BlinkMacSystemFont, Segoe UI, Noto Sans TC, sans-serif"
        font-size="32" font-weight="700" fill="#1e293b">
    Agent Architecture Patterns
  </text>
  <text x="600" y="105" text-anchor="middle"
        font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif"
        font-size="18" font-weight="600" fill="#475569">
    8 Reusable Patterns from Production Source Code
  </text>
  <line x1="350" y1="125" x2="850" y2="125" stroke="#e2e8f0" stroke-width="1.5"/>

  <!-- State Store (center top, widened to fit text) -->
  <rect x="370" y="145" width="460" height="42" rx="12" fill="#bfdbfe" stroke="#2563eb" stroke-width="3"/>
  <text x="600" y="172" text-anchor="middle"
        font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif"
        font-size="18" font-weight="700" fill="#1e3a5f">State Store · Immutable + Hooks</text>

  <!-- 4 core pattern cards -->
  <g transform="translate(160, 260)">
    <rect x="-110" y="-35" width="220" height="90" rx="12" fill="#bbf7d0" stroke="#16a34a" stroke-width="3"/>
    <text x="0" y="-6" text-anchor="middle" font-family="sans-serif" font-size="20" font-weight="700" fill="#166534">Tool Pipeline</text>
    <text x="0" y="20" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="600" fill="#15803d">Define → Build → Filter</text>
    <text x="0" y="42" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="600" fill="#475569">Dynamic tool discovery</text>
  </g>

  <g transform="translate(440, 260)">
    <rect x="-110" y="-35" width="220" height="90" rx="12" fill="#fde68a" stroke="#d97706" stroke-width="3"/>
    <text x="0" y="-6" text-anchor="middle" font-family="sans-serif" font-size="20" font-weight="700" fill="#92400e">Side-Query</text>
    <text x="0" y="20" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="600" fill="#b45309">Cheap Model Router</text>
    <text x="0" y="42" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="600" fill="#475569">Cost-efficient triage</text>
  </g>

  <g transform="translate(720, 260)">
    <rect x="-110" y="-35" width="220" height="90" rx="12" fill="#fed7aa" stroke="#ea580c" stroke-width="3"/>
    <text x="0" y="-6" text-anchor="middle" font-family="sans-serif" font-size="20" font-weight="700" fill="#9a3412">Coordinator</text>
    <text x="0" y="20" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="600" fill="#c2410c">Worker + XML Inject</text>
    <text x="0" y="42" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="600" fill="#475569">Parallel sub-agents</text>
  </g>

  <g transform="translate(1000, 260)">
    <rect x="-110" y="-35" width="220" height="90" rx="12" fill="#ddd6fe" stroke="#7c3aed" stroke-width="3"/>
    <text x="0" y="-6" text-anchor="middle" font-family="sans-serif" font-size="20" font-weight="700" fill="#5b21b6">Compaction</text>
    <text x="0" y="20" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="600" fill="#6d28d9">3-Layer Strategy</text>
    <text x="0" y="42" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="600" fill="#475569">Context window mgmt</text>
  </g>

  <!-- === DETAIL ZONE === -->
  <!-- Hook system bar -->
  <rect x="100" y="410" width="1000" height="40" rx="8" fill="#0f172a" stroke="#f472b6" stroke-width="1.5"/>
  <text x="600" y="435" text-anchor="middle" font-family="sans-serif" font-size="15" font-weight="700" fill="#f472b6">Hook Event System — 16 Events × 5 Types × 7 Sources</text>

  <!-- Additional patterns (larger, with purpose) -->
  <rect x="70" y="465" width="320" height="52" rx="8" fill="#1e293b" stroke="#475569" stroke-width="1"/>
  <text x="230" y="487" text-anchor="middle" font-family="sans-serif" font-size="16" font-weight="700" fill="#cbd5e1">Permissions</text>
  <text x="230" y="506" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="600" fill="#94a3b8">7-source priority chain</text>

  <rect x="420" y="465" width="320" height="52" rx="8" fill="#1e293b" stroke="#475569" stroke-width="1"/>
  <text x="580" y="487" text-anchor="middle" font-family="sans-serif" font-size="16" font-weight="700" fill="#cbd5e1">Deferred Load</text>
  <text x="580" y="506" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="600" fill="#94a3b8">Schema-on-demand fetch</text>

  <rect x="770" y="465" width="320" height="52" rx="8" fill="#1e293b" stroke="#475569" stroke-width="1"/>
  <text x="930" y="487" text-anchor="middle" font-family="sans-serif" font-size="16" font-weight="700" fill="#cbd5e1">21 Subsystems</text>
  <text x="930" y="506" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="600" fill="#94a3b8">1,902 TypeScript files audited</text>

  <!-- Source label -->
  <text x="600" y="560" text-anchor="middle"
        font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif"
        font-size="15" font-weight="600" fill="#94a3b8">
    Patterns extracted for reuse in your agent systems
  </text>

  <!-- Bottom attribution -->
  <g opacity="0.45">
    <text x="600" y="618" text-anchor="middle" fill="#64748b" font-family="Segoe UI, Arial, sans-serif" font-size="11" font-weight="600" letter-spacing="0.5px">osisdie.github.io · Agent Architecture Patterns</text>
  </g>
</svg>
