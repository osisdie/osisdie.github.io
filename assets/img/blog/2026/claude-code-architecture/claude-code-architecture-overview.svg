  <!-- Anchor: chips (4 items) -->
  <g>
    <rect x="250" y="475" width="160" height="56" rx="14" fill="none" stroke="#CB4B16" stroke-width="3"/>
    <text x="330" y="508" text-anchor="middle" font-family='"JetBrains Mono", "Consolas", "Menlo", monospace' font-size="14" font-weight="700" fill="#CB4B16" letter-spacing="1px">TOOL PIPELINE</text>
    <rect x="430" y="475" width="160" height="56" rx="14" fill="none" stroke="#CB4B16" stroke-width="3"/>
    <text x="510" y="508" text-anchor="middle" font-family='"JetBrains Mono", "Consolas", "Menlo", monospace' font-size="14" font-weight="700" fill="#CB4B16" letter-spacing="1px">SIDE-QUERY</text>
    <rect x="610" y="475" width="160" height="56" rx="14" fill="none" stroke="#CB4B16" stroke-width="3"/>
    <text x="690" y="508" text-anchor="middle" font-family='"JetBrains Mono", "Consolas", "Menlo", monospace' font-size="14" font-weight="700" fill="#CB4B16" letter-spacing="1px">COORDINATOR</text>
    <rect x="790" y="475" width="160" height="56" rx="14" fill="none" stroke="#CB4B16" stroke-width="3"/>
    <text x="870" y="508" text-anchor="middle" font-family='"JetBrains Mono", "Consolas", "Menlo", monospace' font-size="14" font-weight="700" fill="#CB4B16" letter-spacing="1px">HOOK SYSTEM</text>
