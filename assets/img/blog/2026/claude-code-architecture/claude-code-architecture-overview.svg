<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 540" font-family="-apple-system, system-ui, Arial, sans-serif">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#1e293b;stop-opacity:1"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="680" height="540" fill="url(#bgGrad)" rx="12"/>

  <!-- Title -->
  <text x="340" y="38" text-anchor="middle" fill="#f1f5f9" font-size="19" font-weight="700" letter-spacing="0.5px">Agent Architecture Patterns</text>
  <text x="340" y="58" text-anchor="middle" fill="#94a3b8" font-size="13" font-weight="600">8 Reusable Patterns from Production Source</text>

  <!-- Center: State Store -->
  <rect x="270" y="80" width="140" height="44" rx="10" fill="#1e3a5f" stroke="#38bdf8" stroke-width="2"/>
  <text x="340" y="100" text-anchor="middle" fill="#38bdf8" font-size="14" font-weight="700">State Store</text>
  <text x="340" y="116" text-anchor="middle" fill="#7dd3fc" font-size="13" font-weight="600">Immutable + Hooks</text>

  <!-- Ring 1: 4 core patterns -->
  <!-- Tool Pipeline (left) -->
  <rect x="30" y="150" width="145" height="60" rx="8" fill="#1e293b" stroke="#4ade80" stroke-width="1.5"/>
  <text x="102" y="174" text-anchor="middle" fill="#4ade80" font-size="14" font-weight="600">Tool Pipeline</text>
  <text x="102" y="196" text-anchor="middle" fill="#86efac" font-size="13" font-weight="600">Define→Build→Filter</text>

  <!-- Side-Query (center-left) -->
  <rect x="190" y="150" width="140" height="60" rx="8" fill="#1e293b" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="260" y="174" text-anchor="middle" fill="#f59e0b" font-size="14" font-weight="600">Side-Query</text>
  <text x="260" y="196" text-anchor="middle" fill="#fcd34d" font-size="13" font-weight="600">Cheap Model Router</text>

  <!-- Coordinator/Worker (center-right) -->
  <rect x="345" y="150" width="150" height="60" rx="8" fill="#1e293b" stroke="#fb923c" stroke-width="1.5"/>
  <text x="420" y="174" text-anchor="middle" fill="#fb923c" font-size="14" font-weight="600">Coordinator</text>
  <text x="420" y="196" text-anchor="middle" fill="#fdba74" font-size="13" font-weight="600">Worker + XML Inject</text>

  <!-- Context Compaction (right) -->
  <rect x="510" y="150" width="140" height="60" rx="8" fill="#1e293b" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="580" y="174" text-anchor="middle" fill="#a78bfa" font-size="14" font-weight="600">Compaction</text>
  <text x="580" y="196" text-anchor="middle" fill="#c4b5fd" font-size="13" font-weight="600">3-Layer Strategy</text>

  <!-- Connection lines from State Store to Ring 1 -->
  <line x1="290" y1="124" x2="130" y2="150" stroke="#475569" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="320" y1="124" x2="260" y2="150" stroke="#475569" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="360" y1="124" x2="420" y2="150" stroke="#475569" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="390" y1="124" x2="560" y2="150" stroke="#475569" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- Hook System (full-width outer layer) -->
  <rect x="30" y="240" width="620" height="50" rx="8" fill="#0f172a" stroke="#f472b6" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="340" y="262" text-anchor="middle" fill="#f472b6" font-size="15" font-weight="700">Hook Event System</text>
  <text x="340" y="280" text-anchor="middle" fill="#f9a8d4" font-size="13" font-weight="600">16 Events × 5 Types × 7 Sources</text>

  <!-- Connection lines from Ring 1 to Hook System -->
  <line x1="102" y1="210" x2="102" y2="240" stroke="#475569" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="260" y1="210" x2="260" y2="240" stroke="#475569" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="420" y1="210" x2="420" y2="240" stroke="#475569" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="580" y1="210" x2="580" y2="240" stroke="#475569" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- Brief patterns row -->
  <rect x="30" y="315" width="195" height="48" rx="8" fill="#1e293b" stroke="#475569" stroke-width="1"/>
  <text x="127" y="338" text-anchor="middle" fill="#94a3b8" font-size="14" font-weight="600">Permissions</text>
  <text x="127" y="354" text-anchor="middle" fill="#94a3b8" font-size="13" font-weight="600">Source Priority Rules</text>

  <rect x="242" y="315" width="195" height="48" rx="8" fill="#1e293b" stroke="#475569" stroke-width="1"/>
  <text x="339" y="338" text-anchor="middle" fill="#94a3b8" font-size="14" font-weight="600">Deferred Load</text>
  <text x="339" y="354" text-anchor="middle" fill="#94a3b8" font-size="13" font-weight="600">Lazy Tool Discovery</text>

  <rect x="454" y="315" width="195" height="48" rx="8" fill="#1e293b" stroke="#475569" stroke-width="1"/>
  <text x="551" y="338" text-anchor="middle" fill="#94a3b8" font-size="14" font-weight="600">21 Subsystems</text>
  <text x="551" y="354" text-anchor="middle" fill="#94a3b8" font-size="13" font-weight="600">1,902 TypeScript Files</text>

  <!-- Source label -->
  <rect x="140" y="390" width="400" height="36" rx="8" fill="#0f172a" stroke="#475569" stroke-width="1"/>
  <text x="340" y="413" text-anchor="middle" fill="#cbd5e1" font-size="14" font-weight="600">Source: Claude Code Architecture</text>

  <!-- Adoption arrow -->
  <text x="340" y="455" text-anchor="middle" fill="#94a3b8" font-size="13" font-weight="600">↑ Patterns extracted for reuse in your agent systems ↑</text>

  <!-- Legend -->
  <circle cx="135" cy="485" r="5" fill="#4ade80"/>
  <text x="148" y="489" fill="#94a3b8" font-size="13" font-weight="600">Deep Dive</text>
  <circle cx="265" cy="485" r="5" fill="#f472b6"/>
  <text x="278" y="489" fill="#94a3b8" font-size="13" font-weight="600">Extensibility</text>
  <circle cx="395" cy="485" r="5" fill="#475569"/>
  <text x="408" y="489" fill="#94a3b8" font-size="13" font-weight="600">Brief Mention</text>

  <!-- Bottom attribution -->
  <g opacity="0.45">
    <text x="340" y="528" text-anchor="middle" fill="#64748b" font-family="-apple-system, system-ui, Arial, sans-serif" font-size="11" font-weight="600" letter-spacing="0.5px">osisdie.github.io · Agent Architecture Patterns</text>
  </g>
</svg>
