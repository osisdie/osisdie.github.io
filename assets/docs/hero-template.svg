<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <!-- layout: hybrid -->
  <defs>
    <linearGradient id="transitionGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f1f5f9"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
    <linearGradient id="detailBgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- === BACKGROUND LAYERS === -->
  <!-- White head zone -->
  <rect width="1200" height="630" fill="#ffffff"/>
  <!-- Dark detail zone -->
  <rect y="390" width="1200" height="240" fill="url(#detailBgGrad)"/>
  <!-- Transition gradient -->
  <rect y="370" width="1200" height="30" fill="url(#transitionGrad)"/>

  <!-- === HEAD ZONE (y: 0-370) === -->

  <!-- Title -->
  <text x="600" y="80" text-anchor="middle"
        font-family="-apple-system, BlinkMacSystemFont, Segoe UI, Noto Sans TC, sans-serif"
        font-size="32" font-weight="700" fill="#1e293b">
    Your Post Title Here
  </text>

  <!-- Subtitle -->
  <text x="600" y="115" text-anchor="middle"
        font-family="-apple-system, BlinkMacSystemFont, Segoe UI, Noto Sans TC, sans-serif"
        font-size="18" font-weight="600" fill="#475569">
    A concise subtitle describing the key angle
  </text>

  <!-- Divider -->
  <line x1="400" y1="140" x2="800" y2="140" stroke="#e2e8f0" stroke-width="1.5"/>

  <!-- Takeaway pill 1 (green) -->
  <rect x="120" y="170" width="280" height="48" rx="24" fill="#dcfce7" filter="url(#shadow)"/>
  <text x="260" y="200" text-anchor="middle"
        font-family="-apple-system, BlinkMacSystemFont, Segoe UI, Noto Sans TC, sans-serif"
        font-size="16" font-weight="700" fill="#166534">
    Key Takeaway One
  </text>

  <!-- Takeaway pill 2 (blue) -->
  <rect x="460" y="170" width="280" height="48" rx="24" fill="#dbeafe" filter="url(#shadow)"/>
  <text x="600" y="200" text-anchor="middle"
        font-family="-apple-system, BlinkMacSystemFont, Segoe UI, Noto Sans TC, sans-serif"
        font-size="16" font-weight="700" fill="#1e3a5f">
    Key Takeaway Two
  </text>

  <!-- Takeaway pill 3 (amber) -->
  <rect x="800" y="170" width="280" height="48" rx="24" fill="#fef3c7" filter="url(#shadow)"/>
  <text x="940" y="200" text-anchor="middle"
        font-family="-apple-system, BlinkMacSystemFont, Segoe UI, Noto Sans TC, sans-serif"
        font-size="16" font-weight="700" fill="#92400e">
    Key Takeaway Three
  </text>

  <!-- Optional: additional head content (icons, badges, etc.) at y=240-350 -->
  <text x="600" y="300" text-anchor="middle"
        font-family="-apple-system, BlinkMacSystemFont, Segoe UI, Noto Sans TC, sans-serif"
        font-size="15" font-weight="600" fill="#64748b">
    Additional context or framework badges go here
  </text>

  <!-- === DETAIL ZONE (y: 400-610) === -->

  <!-- Example: 3-column architecture boxes -->
  <g transform="translate(200, 430)">
    <rect x="-80" y="-15" width="160" height="55" rx="8" fill="#0f172a" stroke="#22d3ee" stroke-width="1.5"/>
    <text x="0" y="8" text-anchor="middle"
          font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif"
          font-size="14" font-weight="700" fill="#22d3ee">Component A</text>
    <text x="0" y="28" text-anchor="middle"
          font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif"
          font-size="13" font-weight="600" fill="#94a3b8">detail note</text>
  </g>

  <g transform="translate(600, 430)">
    <rect x="-80" y="-15" width="160" height="55" rx="8" fill="#0f172a" stroke="#4ade80" stroke-width="1.5"/>
    <text x="0" y="8" text-anchor="middle"
          font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif"
          font-size="14" font-weight="700" fill="#4ade80">Component B</text>
    <text x="0" y="28" text-anchor="middle"
          font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif"
          font-size="13" font-weight="600" fill="#94a3b8">detail note</text>
  </g>

  <g transform="translate(1000, 430)">
    <rect x="-80" y="-15" width="160" height="55" rx="8" fill="#0f172a" stroke="#fb923c" stroke-width="1.5"/>
    <text x="0" y="8" text-anchor="middle"
          font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif"
          font-size="14" font-weight="700" fill="#fb923c">Component C</text>
    <text x="0" y="28" text-anchor="middle"
          font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif"
          font-size="13" font-weight="600" fill="#94a3b8">detail note</text>
  </g>

  <!-- Bottom tech keywords -->
  <text x="600" y="570" text-anchor="middle"
        font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif"
        font-size="14" font-weight="600" fill="#64748b">
    Keyword A · Keyword B · Keyword C · Keyword D
  </text>

  <!-- Bottom attribution -->
  <g opacity="0.45">
    <text x="600" y="618" text-anchor="middle" fill="#64748b"
          font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif"
          font-size="11" font-weight="600" letter-spacing="0.5px">osisdie.github.io · Post Title</text>
  </g>
</svg>
